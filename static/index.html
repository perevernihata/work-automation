<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Review Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 380px;
      min-width: 380px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .sidebar-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: var(--accent);
      color: #000;
      font-size: 12px;
      font-weight: 600;
      padding: 1px 8px;
      border-radius: 10px;
    }

    .scan-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .scan-btn:hover { border-color: var(--accent); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Repo tabs ── */
    .repo-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
    }
    .repo-tabs::-webkit-scrollbar { height: 0; }

    .repo-tab {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: inherit;
    }
    .repo-tab:hover { color: var(--text); }
    .repo-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .repo-tab .tab-count {
      display: inline-block;
      background: var(--border);
      font-size: 11px;
      padding: 0 5px;
      border-radius: 8px;
      margin-left: 4px;
      color: var(--text-dim);
    }
    .repo-tab.active .tab-count {
      background: rgba(88,166,255,0.2);
      color: var(--accent);
    }

    .pr-list {
      flex: 1;
      overflow-y: auto;
    }

    .pr-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .pr-item:hover { background: rgba(88, 166, 255, 0.05); }
    .pr-item.active { background: rgba(88, 166, 255, 0.1); border-left: 3px solid var(--accent); }

    .pr-item-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pr-item-meta {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pr-item-stats {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .stat-chip {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 500;
    }
    .stat-chip.critical { background: rgba(248,81,73,0.2); color: var(--red); }
    .stat-chip.warning { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .stat-chip.info { background: rgba(88,166,255,0.15); color: var(--blue); }
    .stat-chip.pending { background: rgba(88,166,255,0.15); color: var(--accent); }
    .stat-chip.done { background: rgba(63,185,80,0.15); color: var(--green); }

    .severity-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 2px;
    }
    .severity-dot.high { background: var(--red); }
    .severity-dot.medium { background: var(--yellow); }
    .severity-dot.low { background: var(--green); }

    /* ── Main panel ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 15px;
    }

    .detail-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .detail-title {
      font-size: 18px;
      font-weight: 600;
    }

    .detail-title a {
      color: var(--accent);
      text-decoration: none;
    }
    .detail-title a:hover { text-decoration: underline; }

    .detail-meta {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 4px;
    }

    .detail-actions {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .severity-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 8px;
      border-radius: 10px;
      text-transform: uppercase;
    }
    .severity-high { background: var(--red); color: #fff; }
    .severity-medium { background: var(--yellow); color: #000; }
    .severity-low { background: var(--green); color: #000; }

    .detail-summary {
      padding: 12px 24px;
      font-size: 14px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: rgba(22,27,34,0.5);
    }

    .concern-list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .concern {
      border-bottom: 1px solid var(--border);
    }

    .concern-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 24px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .concern-row:hover { background: rgba(88,166,255,0.03); }

    .concern-severity {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 7px;
    }
    .concern-severity.critical { background: var(--red); }
    .concern-severity.warning { background: var(--yellow); }
    .concern-severity.info { background: var(--blue); }

    .concern-body { flex: 1; min-width: 0; }

    .concern-file-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .concern-file {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
    }
    .concern-file:hover { text-decoration: underline; }

    .concern-toggle {
      font-size: 10px;
      color: var(--text-dim);
      transition: transform 0.15s;
    }
    .concern-toggle.open { transform: rotate(90deg); }

    .concern-message {
      font-size: 14px;
      margin-top: 4px;
      color: var(--text);
    }

    .concern-actions {
      flex-shrink: 0;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* ── Code snippet ── */
    .snippet {
      display: none;
      margin: 0 24px 12px 44px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.6;
      background: #0d1117;
    }
    .snippet.open { display: block; }

    .snippet-line {
      display: flex;
      padding: 0 12px;
      white-space: pre;
      overflow-x: auto;
    }
    .snippet-line.add { background: rgba(63,185,80,0.1); }
    .snippet-line.del { background: rgba(248,81,73,0.1); }
    .snippet-line.highlight { background: rgba(88,166,255,0.15); }

    .snippet-num {
      flex-shrink: 0;
      width: 48px;
      text-align: right;
      padding-right: 12px;
      color: var(--text-dim);
      user-select: none;
      border-right: 1px solid var(--border);
      margin-right: 12px;
    }

    .snippet-marker {
      flex-shrink: 0;
      width: 12px;
      color: var(--text-dim);
      user-select: none;
    }
    .snippet-line.add .snippet-marker { color: var(--green); }
    .snippet-line.del .snippet-marker { color: var(--red); }

    .snippet-text {
      flex: 1;
      color: var(--text);
    }
    .snippet-line.del .snippet-text { color: var(--red); opacity: 0.7; }

    /* ── Edit textarea ── */
    .edit-area {
      display: none;
      margin: 0 24px 12px 44px;
    }
    .edit-area.open { display: block; }

    .edit-textarea {
      width: 100%;
      min-height: 80px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
    }
    .edit-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .edit-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      justify-content: flex-end;
    }

    .btn-edit {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-edit:hover {
      background: var(--accent);
      color: #000;
    }

    .snippet-link {
      display: block;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .snippet-link:hover { text-decoration: underline; }

    .btn {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      transition: all 0.15s;
    }

    .btn-approve {
      border-color: var(--green);
      color: var(--green);
    }
    .btn-approve:hover {
      background: var(--green);
      color: #000;
    }

    .btn-reject {
      border-color: var(--red);
      color: var(--red);
    }
    .btn-reject:hover {
      background: var(--red);
      color: #fff;
    }

    .btn-approve-all {
      background: var(--green);
      color: #000;
      border-color: var(--green);
      font-weight: 600;
    }
    .btn-approve-all:hover { opacity: 0.85; }

    .btn-dismiss-all {
      border-color: var(--text-dim);
      color: var(--text-dim);
    }
    .btn-dismiss-all:hover {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .status-approved {
      color: var(--green);
      font-size: 12px;
      font-weight: 500;
    }
    .status-rejected {
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      text-decoration: line-through;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      font-size: 12px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .kbd {
      display: inline-block;
      padding: 0 5px;
      font-size: 11px;
      font-family: 'SF Mono', monospace;
      background: var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      margin: 0 2px;
    }

    /* ── Review meta bar ── */
    .review-meta {
      padding: 8px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 11px;
      color: var(--text-dim);
      background: rgba(22,27,34,0.3);
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meta-label { color: var(--text-dim); }
    .meta-value { color: var(--text); font-weight: 500; }

    /* ── Jira ticket ── */
    .jira-bar {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      background: rgba(22,27,34,0.5);
    }

    .jira-key {
      background: #0052CC;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .jira-key:hover { opacity: 0.85; }

    .jira-summary {
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .jira-status {
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 8px;
      background: var(--border);
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .jira-missing {
      padding: 8px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--yellow);
      background: rgba(210,153,34,0.06);
    }

    .pr-item-jira {
      font-size: 11px;
      color: #4C9AFF;
      margin-top: 2px;
    }

    /* ── Daemon status footer ── */
    .daemon-footer {
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface);
      flex-shrink: 0;
    }

    .daemon-state {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .daemon-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .daemon-dot.idle { background: var(--green); }
    .daemon-dot.scanning { background: var(--yellow); animation: pulse 1.2s ease-in-out infinite; }
    .daemon-dot.reviewing { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .daemon-label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .daemon-progress {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .daemon-progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .daemon-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>PR Reviews</h1>
      <div class="sidebar-controls">
        <div class="status-bar" id="status"></div>
        <span class="badge" id="pending-count">0</span>
        <button class="scan-btn" id="scan-btn" onclick="triggerScan()">Scan</button>
      </div>
    </div>
    <div class="repo-tabs" id="repo-tabs"></div>
    <div class="pr-list" id="pr-list"></div>
    <div class="daemon-footer" id="daemon-footer"></div>
  </div>

  <!-- Main detail panel -->
  <div class="main" id="main">
    <div class="main-empty">
      Select a PR from the sidebar<br>
      <span style="font-size:13px;margin-top:8px;display:block">
        <span class="kbd">j</span>/<span class="kbd">k</span> navigate
        &nbsp; <span class="kbd">r</span> scan
        &nbsp; <span class="kbd">1</span>-<span class="kbd">9</span> switch repo
      </span>
    </div>
  </div>

  <script>
    let data = { reviews: [], pendingCount: 0 };
    let selectedReviewId = null;
    let focusedIndex = -1;
    let activeRepo = null; // null = "All"

    function getRepos() {
      const repoSet = new Map();
      for (const r of data.reviews) {
        const key = `${r.prInfo.owner}/${r.prInfo.repo}`;
        repoSet.set(key, (repoSet.get(key) || 0) + 1);
      }
      return repoSet;
    }

    function filteredReviews() {
      if (!activeRepo) return data.reviews;
      return data.reviews.filter(r => `${r.prInfo.owner}/${r.prInfo.repo}` === activeRepo);
    }

    async function loadReviews() {
      try {
        const resp = await fetch('/api/reviews');
        data = await resp.json();
        await precomputeHashes(data.reviews);
        renderTabs();
        renderSidebar();
        // Don't re-render detail panel if user is editing a comment
        if (openEditors.size > 0) return;
        if (selectedReviewId) {
          const still = data.reviews.find(r => r.id === selectedReviewId);
          if (still) renderDetail(still);
        }
      } catch (e) {
        console.error('Failed to load reviews:', e);
      }
    }

    function renderTabs() {
      const repos = getRepos();
      const tabs = document.getElementById('repo-tabs');

      if (repos.size <= 1) {
        tabs.innerHTML = '';
        return;
      }

      const totalPending = data.reviews.reduce(
        (s, r) => s + r.comments.filter(c => c.status === 'pending').length, 0
      );

      let html = `<button class="repo-tab ${activeRepo === null ? 'active' : ''}" onclick="setRepo(null)">
        All<span class="tab-count">${data.reviews.length}</span>
      </button>`;

      for (const [repo, count] of repos) {
        const pending = data.reviews
          .filter(r => `${r.prInfo.owner}/${r.prInfo.repo}` === repo)
          .reduce((s, r) => s + r.comments.filter(c => c.status === 'pending').length, 0);
        const short = repo.split('/')[1] || repo;
        const isActive = activeRepo === repo;
        html += `<button class="repo-tab ${isActive ? 'active' : ''}" onclick="setRepo('${repo}')">
          ${esc(short)}${pending ? `<span class="tab-count">${pending}</span>` : ''}
        </button>`;
      }

      tabs.innerHTML = html;
    }

    function setRepo(repo) {
      activeRepo = repo;
      selectedReviewId = null;
      focusedIndex = -1;
      renderTabs();
      renderSidebar();
      document.getElementById('main').innerHTML = `<div class="main-empty">Select a PR from the sidebar</div>`;
    }

    function renderSidebar() {
      document.getElementById('pending-count').textContent = data.pendingCount;
      const list = document.getElementById('pr-list');
      const reviews = filteredReviews();

      if (reviews.length === 0) {
        list.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px">No reviews yet. Click Scan or wait for the poller.</div>';
        return;
      }

      list.innerHTML = reviews.map((review, i) => {
        const pr = review.prInfo;
        const pending = review.comments.filter(c => c.status === 'pending').length;
        const done = review.comments.filter(c => c.status !== 'pending').length;
        const critical = review.comments.filter(c => c.concern.severity === 'critical' && c.status === 'pending').length;
        const warnings = review.comments.filter(c => c.concern.severity === 'warning' && c.status === 'pending').length;
        const isActive = review.id === selectedReviewId;
        const isFocused = i === focusedIndex;

        return `
          <div class="pr-item ${isActive ? 'active' : ''}"
               onclick="selectReview('${review.id}')"
               data-index="${i}"
               style="${isFocused && !isActive ? 'background:rgba(88,166,255,0.03)' : ''}">
            <div class="pr-item-title">
              <span class="severity-dot ${review.review.overallSeverity}"></span>
              #${pr.number}: ${esc(pr.title)}
            </div>
            <div class="pr-item-meta">
              ${activeRepo ? '' : `<span>${esc(pr.repo)}</span>`}
              <span>@${esc(pr.author)}</span>
              ${review.jiraTicket ? `<span class="pr-item-jira">${esc(review.jiraTicket.key)}</span>` : ''}
            </div>
            <div class="pr-item-stats">
              ${critical ? `<span class="stat-chip critical">${critical} critical</span>` : ''}
              ${warnings ? `<span class="stat-chip warning">${warnings} warning</span>` : ''}
              ${pending ? `<span class="stat-chip pending">${pending} pending</span>` : ''}
              ${done ? `<span class="stat-chip done">${done} handled</span>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    function selectReview(id) {
      selectedReviewId = id;
      const filtered = filteredReviews();
      focusedIndex = filtered.findIndex(r => r.id === id);
      const review = data.reviews.find(r => r.id === id);
      if (review) renderDetail(review);
      renderSidebar();
    }

    function renderMeta(review) {
      const m = review.meta;
      if (!m) return '';

      const duration = m.durationMs < 60000
        ? `${(m.durationMs / 1000).toFixed(1)}s`
        : `${(m.durationMs / 60000).toFixed(1)}m`;

      const tokens = m.inputTokens + m.outputTokens;
      const tokensStr = tokens > 1000 ? `${(tokens / 1000).toFixed(1)}k` : tokens;

      const browsed = m.numTurns > 1;

      return `
        <div class="review-meta">
          <div class="meta-item">
            <span class="meta-label">Duration:</span>
            <span class="meta-value">${duration}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Turns:</span>
            <span class="meta-value">${m.numTurns}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Tokens:</span>
            <span class="meta-value">${tokensStr}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Cost:</span>
            <span class="meta-value">$${m.costUsd.toFixed(3)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Codebase:</span>
            <span class="meta-value">${browsed ? 'Yes — browsed files' : 'Diff only'}</span>
          </div>
        </div>`;
    }

    function renderDetail(review) {
      const pr = review.prInfo;
      const pending = review.comments.filter(c => c.status === 'pending');

      let bulkActions = '';
      if (pending.length > 1) {
        bulkActions = `
          <button class="btn btn-approve-all" onclick="approveAll('${review.id}')">Approve all (${pending.length})</button>
          <button class="btn btn-dismiss-all" onclick="dismissAll('${review.id}')">Dismiss all</button>`;
      } else if (pending.length === 1) {
        bulkActions = `
          <button class="btn btn-approve-all" onclick="approveAll('${review.id}')">Approve</button>
          <button class="btn btn-dismiss-all" onclick="dismissAll('${review.id}')">Dismiss</button>`;
      }

      let jiraHtml = '';
      const jt = review.jiraTicket;
      if (jt) {
        jiraHtml = `
          <div class="jira-bar">
            <a class="jira-key" href="${jt.url}" target="_blank">${esc(jt.key)}</a>
            <span class="jira-summary">${esc(jt.summary)}</span>
            <span class="jira-status">${esc(jt.status)}</span>
            <span style="color:var(--text-dim);font-size:11px">${esc(jt.type)} · ${esc(jt.priority)} · ${esc(jt.assignee)}</span>
          </div>`;
      } else {
        jiraHtml = `<div class="jira-missing">No Jira ticket linked — PR title doesn't contain a recognizable ticket key</div>`;
      }

      document.getElementById('main').innerHTML = `
        <div class="detail-header">
          <div>
            <div class="detail-title">
              <a href="${pr.url}" target="_blank">#${pr.number}: ${esc(pr.title)}</a>
            </div>
            <div class="detail-meta">
              ${esc(pr.owner)}/${esc(pr.repo)} · by @${esc(pr.author)} ·
              <span class="severity-badge severity-${review.review.overallSeverity}">
                ${review.review.overallSeverity}
              </span>
              · ${review.comments.length} concern${review.comments.length !== 1 ? 's' : ''}
            </div>
          </div>
          <div class="detail-actions">
            ${bulkActions}
          </div>
        </div>
        ${jiraHtml}
        ${renderMeta(review)}
        <div class="detail-summary">${esc(review.review.summary)}</div>
        <div class="concern-list">
          ${review.comments.map(c => renderConcern(c, pr)).join('')}
        </div>`;
    }

    // Track which snippets/editors are open
    const openSnippets = new Set();
    const openEditors = new Set();

    function toggleSnippet(id) {
      if (openSnippets.has(id)) {
        openSnippets.delete(id);
      } else {
        openSnippets.add(id);
      }
      // Re-render just the toggle state
      const snippet = document.getElementById(`snippet-${id}`);
      const toggle = document.getElementById(`toggle-${id}`);
      if (snippet) snippet.classList.toggle('open', openSnippets.has(id));
      if (toggle) toggle.classList.toggle('open', openSnippets.has(id));
    }

    function renderSnippet(comment, pr) {
      const s = comment.snippet;
      if (!s || !s.lines || s.lines.length === 0) return '';

      const targetLine = comment.concern.line;
      const fileLink = buildFileLink(pr, comment.concern);
      const isOpen = openSnippets.has(comment.id);

      const linesHtml = s.lines.map(l => {
        const isTarget = targetLine && l.num === targetLine;
        const cls = [
          'snippet-line',
          l.type === 'add' ? 'add' : l.type === 'del' ? 'del' : '',
          isTarget ? 'highlight' : ''
        ].filter(Boolean).join(' ');

        const marker = l.type === 'add' ? '+' : l.type === 'del' ? '-' : ' ';
        const num = l.num != null ? l.num : '';

        return `<div class="${cls}"><span class="snippet-num">${num}</span><span class="snippet-marker">${marker}</span><span class="snippet-text">${escCode(l.text)}</span></div>`;
      }).join('');

      return `
        <div class="snippet ${isOpen ? 'open' : ''}" id="snippet-${comment.id}">
          ${linesHtml}
          <a class="snippet-link" href="${fileLink}" target="_blank">Open in GitHub</a>
        </div>`;
    }

    function escCode(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderConcern(comment, pr) {
      const c = comment.concern;
      const fileLink = buildFileLink(pr, c);
      const location = c.line ? `${c.file}:${c.line}` : c.file;
      const hasSnippet = comment.snippet && comment.snippet.lines && comment.snippet.lines.length > 0;
      const isOpen = openSnippets.has(comment.id);

      let actions = '';
      if (comment.status === 'pending') {
        actions = `
          <button class="btn btn-edit" onclick="event.stopPropagation();toggleEdit('${comment.id}')">Edit</button>
          <button class="btn btn-approve" onclick="event.stopPropagation();approve('${comment.id}', this)">Approve</button>
          <button class="btn btn-reject" onclick="event.stopPropagation();reject('${comment.id}', this)">Reject</button>`;
      } else if (comment.status === 'approved') {
        actions = '<span class="status-approved">Posted</span>';
      } else {
        actions = '<span class="status-rejected">Dismissed</span>';
      }

      const editorOpen = openEditors.has(comment.id);

      return `
        <div class="concern">
          <div class="concern-row" onclick="${hasSnippet ? `toggleSnippet('${comment.id}')` : ''}">
            <div class="concern-severity ${c.severity}"></div>
            <div class="concern-body">
              <div class="concern-file-row">
                ${hasSnippet ? `<span class="concern-toggle ${isOpen ? 'open' : ''}" id="toggle-${comment.id}">&#9654;</span>` : ''}
                <a class="concern-file" href="${fileLink}" target="_blank" onclick="event.stopPropagation()">${esc(location)}</a>
              </div>
              <div class="concern-message" id="msg-${comment.id}">${esc(c.message)}</div>
            </div>
            <div class="concern-actions">
              ${actions}
            </div>
          </div>
          <div class="edit-area ${editorOpen ? 'open' : ''}" id="editor-${comment.id}">
            <textarea class="edit-textarea" id="edittext-${comment.id}">${esc(c.message)}</textarea>
            <div class="edit-actions">
              <button class="btn" onclick="cancelEdit('${comment.id}')">Cancel</button>
              <button class="btn btn-approve" onclick="approveEdited('${comment.id}')">Post edited</button>
            </div>
          </div>
          ${renderSnippet(comment, pr)}
        </div>`;
    }

    // ── Hashing for GitHub diff links ──
    const hashCache = {};

    async function sha256(str) {
      if (hashCache[str]) return hashCache[str];
      const buf = new TextEncoder().encode(str);
      const digest = await crypto.subtle.digest('SHA-256', buf);
      const hex = Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
      hashCache[str] = hex;
      return hex;
    }

    async function precomputeHashes(reviews) {
      const files = new Set();
      for (const r of reviews) {
        for (const c of r.comments) {
          files.add(c.concern.file);
        }
      }
      await Promise.all([...files].map(f => sha256(f)));
    }

    function buildFileLink(pr, concern) {
      const hash = hashCache[concern.file] || '';
      const anchor = hash ? `#diff-${hash}` + (concern.line ? `R${concern.line}` : '') : '';
      return `${pr.url}/files${anchor}`;
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ── Edit ──
    function toggleEdit(id) {
      const el = document.getElementById(`editor-${id}`);
      if (!el) return;
      if (openEditors.has(id)) {
        openEditors.delete(id);
        el.classList.remove('open');
      } else {
        openEditors.add(id);
        el.classList.add('open');
        const ta = document.getElementById(`edittext-${id}`);
        if (ta) ta.focus();
      }
    }

    function cancelEdit(id) {
      openEditors.delete(id);
      const el = document.getElementById(`editor-${id}`);
      if (el) el.classList.remove('open');
    }

    async function approveEdited(id) {
      const ta = document.getElementById(`edittext-${id}`);
      if (!ta) return;
      const body = ta.value.trim();
      if (!body) { alert('Comment is empty'); return; }
      try {
        const resp = await fetch(`/api/comments/${id}/approve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ body }),
        });
        if (!resp.ok) {
          const err = await resp.json();
          alert('Error: ' + (err.error || 'Unknown'));
          return;
        }
        openEditors.delete(id);
        await loadReviews();
      } catch (e) {
        alert('Failed: ' + e.message);
      }
    }

    // ── Actions ──
    async function approve(id, btn) {
      if (btn) btn.disabled = true;
      try {
        const resp = await fetch(`/api/comments/${id}/approve`, { method: 'POST' });
        if (!resp.ok) {
          const err = await resp.json();
          alert('Error: ' + (err.error || 'Unknown'));
          return;
        }
        await loadReviews();
      } catch (e) {
        alert('Failed: ' + e.message);
      }
    }

    async function reject(id, btn) {
      if (btn) btn.disabled = true;
      try {
        const resp = await fetch(`/api/comments/${id}/reject`, { method: 'POST' });
        if (!resp.ok) {
          const err = await resp.json();
          alert('Error: ' + (err.error || 'Unknown'));
          return;
        }
        await loadReviews();
      } catch (e) {
        alert('Failed: ' + e.message);
      }
    }

    async function approveAll(reviewId) {
      try {
        await fetch(`/api/reviews/${reviewId}/approve-all`, { method: 'POST' });
        await loadReviews();
      } catch (e) {
        alert('Failed: ' + e.message);
      }
    }

    async function dismissAll(reviewId) {
      const review = data.reviews.find(r => r.id === reviewId);
      if (!review) return;
      const pending = review.comments.filter(c => c.status === 'pending');
      for (const c of pending) {
        await fetch(`/api/comments/${c.id}/reject`, { method: 'POST' });
      }
      await loadReviews();
    }

    async function triggerScan() {
      const btn = document.getElementById('scan-btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span> Scanning...';
      try {
        const resp = await fetch('/api/scan', { method: 'POST' });
        const result = await resp.json();
        status.textContent = result.message || 'Done';
        await loadReviews();
      } catch (e) {
        status.textContent = 'Scan failed';
      } finally {
        btn.disabled = false;
        setTimeout(() => { status.textContent = ''; }, 5000);
      }
    }

    // ── Keyboard navigation ──
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const filtered = filteredReviews();
      const len = filtered.length;

      if (e.key === 'j' || e.key === 'ArrowDown') {
        e.preventDefault();
        if (!len) return;
        focusedIndex = Math.min(focusedIndex + 1, len - 1);
        selectReview(filtered[focusedIndex].id);
      } else if (e.key === 'k' || e.key === 'ArrowUp') {
        e.preventDefault();
        if (!len) return;
        focusedIndex = Math.max(focusedIndex - 1, 0);
        selectReview(filtered[focusedIndex].id);
      } else if (e.key === 'r') {
        triggerScan();
      } else if (e.key >= '0' && e.key <= '9') {
        // 0 = All, 1-9 = repos by order
        const repos = [...getRepos().keys()];
        const idx = parseInt(e.key);
        if (idx === 0) {
          setRepo(null);
        } else if (idx <= repos.length) {
          setRepo(repos[idx - 1]);
        }
      }
    });

    // ── Daemon status ──
    async function loadStatus() {
      try {
        const resp = await fetch('/api/status');
        const s = await resp.json();
        renderDaemonFooter(s);
      } catch (e) {}
    }

    function renderDaemonFooter(s) {
      const el = document.getElementById('daemon-footer');

      let label = '';
      let dotClass = s.state;

      if (s.state === 'idle') {
        if (s.nextPollAt) {
          const diff = Math.max(0, Math.round((new Date(s.nextPollAt) - Date.now()) / 1000));
          const min = Math.floor(diff / 60);
          const sec = diff % 60;
          label = `Idle — next scan in ${min}:${String(sec).padStart(2, '0')}`;
        } else {
          label = 'Idle';
        }
      } else if (s.state === 'scanning') {
        label = 'Scanning for new PRs...';
      } else if (s.state === 'reviewing' && s.currentPR) {
        label = `Reviewing #${s.currentPR.number}: ${s.currentPR.title}`;
      }

      let progressHtml = '';
      if (s.progress && s.state === 'reviewing') {
        const pct = Math.round((s.progress.current / s.progress.total) * 100);
        progressHtml = `
          <div class="daemon-progress">
            <div class="daemon-progress-bar" style="width:${pct}%"></div>
          </div>`;
      }

      let metaHtml = '';
      const metaParts = [];
      if (s.progress && s.state === 'reviewing') {
        const p = s.progress;
        let parts = `${p.current}/${p.total}`;
        if (p.succeeded) parts += ` · ${p.succeeded} done`;
        if (p.failed) parts += ` · ${p.failed} failed`;
        metaParts.push(parts);
      }
      if (s.retryCount > 0) {
        metaParts.push(`${s.retryCount} queued for retry`);
      }
      if (s.lastScanAt) {
        const ago = Math.round((Date.now() - new Date(s.lastScanAt)) / 60000);
        const agoText = ago < 1 ? 'just now' : `${ago}m ago`;
        metaParts.push(`last scan ${agoText} (${s.lastScanReviewed ?? 0} reviewed)`);
      }
      if (metaParts.length) {
        metaHtml = `<div class="daemon-meta"><span>${metaParts.join(' · ')}</span></div>`;
      }

      el.innerHTML = `
        <div class="daemon-state">
          <span class="daemon-dot ${dotClass}"></span>
          <span class="daemon-label">${esc(label)}</span>
        </div>
        ${progressHtml}
        ${metaHtml}`;
    }

    // ── Init ──
    loadReviews();
    loadStatus();
    setInterval(loadReviews, 10_000);
    setInterval(loadStatus, 2_000);
  </script>
</body>
</html>
