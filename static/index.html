<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Review Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 380px;
      min-width: 380px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .sidebar-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: var(--accent);
      color: #000;
      font-size: 12px;
      font-weight: 600;
      padding: 1px 8px;
      border-radius: 10px;
    }

    .scan-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .scan-btn:hover { border-color: var(--accent); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Repo tabs ── */
    .repo-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
    }
    .repo-tabs::-webkit-scrollbar { height: 0; }

    .repo-tab {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: inherit;
    }
    .repo-tab:hover { color: var(--text); }
    .repo-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .repo-tab .tab-count {
      display: inline-block;
      background: var(--border);
      font-size: 11px;
      padding: 0 5px;
      border-radius: 8px;
      margin-left: 4px;
      color: var(--text-dim);
    }
    .repo-tab.active .tab-count {
      background: rgba(88,166,255,0.2);
      color: var(--accent);
    }

    .pr-list {
      flex: 1;
      overflow-y: auto;
    }

    .pr-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .pr-item:hover { background: rgba(88, 166, 255, 0.05); }
    .pr-item.active { background: rgba(88, 166, 255, 0.1); border-left: 3px solid var(--accent); }

    .pr-item-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pr-item-meta {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pr-item-stats {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .stat-chip {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 500;
    }
    .stat-chip.critical { background: rgba(248,81,73,0.2); color: var(--red); }
    .stat-chip.warning { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .stat-chip.info { background: rgba(88,166,255,0.15); color: var(--blue); }
    .stat-chip.pending { background: rgba(88,166,255,0.15); color: var(--accent); }
    .stat-chip.done { background: rgba(63,185,80,0.15); color: var(--green); }

    .severity-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 2px;
    }
    .severity-dot.high { background: var(--red); }
    .severity-dot.medium { background: var(--yellow); }
    .severity-dot.low { background: var(--green); }

    /* ── Main panel ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 15px;
    }

    .detail-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .detail-title {
      font-size: 18px;
      font-weight: 600;
    }

    .detail-title a {
      color: var(--accent);
      text-decoration: none;
    }
    .detail-title a:hover { text-decoration: underline; }

    .detail-meta {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 4px;
    }

    .detail-actions {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .severity-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 8px;
      border-radius: 10px;
      text-transform: uppercase;
    }
    .severity-high { background: var(--red); color: #fff; }
    .severity-medium { background: var(--yellow); color: #000; }
    .severity-low { background: var(--green); color: #000; }

    .detail-summary {
      padding: 12px 24px;
      font-size: 14px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: rgba(22,27,34,0.5);
    }

    .concern-list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .concern {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
    }

    .concern-severity {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 7px;
    }
    .concern-severity.critical { background: var(--red); }
    .concern-severity.warning { background: var(--yellow); }
    .concern-severity.info { background: var(--blue); }

    .concern-body { flex: 1; min-width: 0; }

    .concern-file {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
    }
    .concern-file:hover { text-decoration: underline; }

    .concern-message {
      font-size: 14px;
      margin-top: 4px;
      color: var(--text);
    }

    .concern-actions {
      flex-shrink: 0;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      transition: all 0.15s;
    }

    .btn-approve {
      border-color: var(--green);
      color: var(--green);
    }
    .btn-approve:hover {
      background: var(--green);
      color: #000;
    }

    .btn-reject {
      border-color: var(--red);
      color: var(--red);
    }
    .btn-reject:hover {
      background: var(--red);
      color: #fff;
    }

    .btn-approve-all {
      background: var(--green);
      color: #000;
      border-color: var(--green);
      font-weight: 600;
    }
    .btn-approve-all:hover { opacity: 0.85; }

    .btn-dismiss-all {
      border-color: var(--text-dim);
      color: var(--text-dim);
    }
    .btn-dismiss-all:hover {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .status-approved {
      color: var(--green);
      font-size: 12px;
      font-weight: 500;
    }
    .status-rejected {
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      text-decoration: line-through;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      font-size: 12px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .kbd {
      display: inline-block;
      padding: 0 5px;
      font-size: 11px;
      font-family: 'SF Mono', monospace;
      background: var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>PR Reviews</h1>
      <div class="sidebar-controls">
        <div class="status-bar" id="status"></div>
        <span class="badge" id="pending-count">0</span>
        <button class="scan-btn" id="scan-btn" onclick="triggerScan()">Scan</button>
      </div>
    </div>
    <div class="repo-tabs" id="repo-tabs"></div>
    <div class="pr-list" id="pr-list"></div>
  </div>

  <!-- Main detail panel -->
  <div class="main" id="main">
    <div class="main-empty">
      Select a PR from the sidebar<br>
      <span style="font-size:13px;margin-top:8px;display:block">
        <span class="kbd">j</span>/<span class="kbd">k</span> navigate
        &nbsp; <span class="kbd">r</span> scan
        &nbsp; <span class="kbd">1</span>-<span class="kbd">9</span> switch repo
      </span>
    </div>
  </div>

  <script>
    let data = { reviews: [], pendingCount: 0 };
    let selectedReviewId = null;
    let focusedIndex = -1;
    let activeRepo = null; // null = "All"

    function getRepos() {
      const repoSet = new Map();
      for (const r of data.reviews) {
        const key = `${r.prInfo.owner}/${r.prInfo.repo}`;
        repoSet.set(key, (repoSet.get(key) || 0) + 1);
      }
      return repoSet;
    }

    function filteredReviews() {
      if (!activeRepo) return data.reviews;
      return data.reviews.filter(r => `${r.prInfo.owner}/${r.prInfo.repo}` === activeRepo);
    }

    async function loadReviews() {
      try {
        const resp = await fetch('/api/reviews');
        data = await resp.json();
        await precomputeHashes(data.reviews);
        renderTabs();
        renderSidebar();
        if (selectedReviewId) {
          const still = data.reviews.find(r => r.id === selectedReviewId);
          if (still) renderDetail(still);
        }
      } catch (e) {
        console.error('Failed to load reviews:', e);
      }
    }

    function renderTabs() {
      const repos = getRepos();
      const tabs = document.getElementById('repo-tabs');

      if (repos.size <= 1) {
        tabs.innerHTML = '';
        return;
      }

      const totalPending = data.reviews.reduce(
        (s, r) => s + r.comments.filter(c => c.status === 'pending').length, 0
      );

      let html = `<button class="repo-tab ${activeRepo === null ? 'active' : ''}" onclick="setRepo(null)">
        All<span class="tab-count">${data.reviews.length}</span>
      </button>`;

      for (const [repo, count] of repos) {
        const pending = data.reviews
          .filter(r => `${r.prInfo.owner}/${r.prInfo.repo}` === repo)
          .reduce((s, r) => s + r.comments.filter(c => c.status === 'pending').length, 0);
        const short = repo.split('/')[1] || repo;
        const isActive = activeRepo === repo;
        html += `<button class="repo-tab ${isActive ? 'active' : ''}" onclick="setRepo('${repo}')">
          ${esc(short)}${pending ? `<span class="tab-count">${pending}</span>` : ''}
        </button>`;
      }

      tabs.innerHTML = html;
    }

    function setRepo(repo) {
      activeRepo = repo;
      selectedReviewId = null;
      focusedIndex = -1;
      renderTabs();
      renderSidebar();
      document.getElementById('main').innerHTML = `<div class="main-empty">Select a PR from the sidebar</div>`;
    }

    function renderSidebar() {
      document.getElementById('pending-count').textContent = data.pendingCount;
      const list = document.getElementById('pr-list');
      const reviews = filteredReviews();

      if (reviews.length === 0) {
        list.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px">No reviews yet. Click Scan or wait for the poller.</div>';
        return;
      }

      list.innerHTML = reviews.map((review, i) => {
        const pr = review.prInfo;
        const pending = review.comments.filter(c => c.status === 'pending').length;
        const done = review.comments.filter(c => c.status !== 'pending').length;
        const critical = review.comments.filter(c => c.concern.severity === 'critical' && c.status === 'pending').length;
        const warnings = review.comments.filter(c => c.concern.severity === 'warning' && c.status === 'pending').length;
        const isActive = review.id === selectedReviewId;
        const isFocused = i === focusedIndex;

        return `
          <div class="pr-item ${isActive ? 'active' : ''}"
               onclick="selectReview('${review.id}')"
               data-index="${i}"
               style="${isFocused && !isActive ? 'background:rgba(88,166,255,0.03)' : ''}">
            <div class="pr-item-title">
              <span class="severity-dot ${review.review.overallSeverity}"></span>
              #${pr.number}: ${esc(pr.title)}
            </div>
            <div class="pr-item-meta">
              ${activeRepo ? '' : `<span>${esc(pr.repo)}</span>`}
              <span>@${esc(pr.author)}</span>
            </div>
            <div class="pr-item-stats">
              ${critical ? `<span class="stat-chip critical">${critical} critical</span>` : ''}
              ${warnings ? `<span class="stat-chip warning">${warnings} warning</span>` : ''}
              ${pending ? `<span class="stat-chip pending">${pending} pending</span>` : ''}
              ${done ? `<span class="stat-chip done">${done} handled</span>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    function selectReview(id) {
      selectedReviewId = id;
      const filtered = filteredReviews();
      focusedIndex = filtered.findIndex(r => r.id === id);
      const review = data.reviews.find(r => r.id === id);
      if (review) renderDetail(review);
      renderSidebar();
    }

    function renderDetail(review) {
      const pr = review.prInfo;
      const pending = review.comments.filter(c => c.status === 'pending');

      let bulkActions = '';
      if (pending.length > 1) {
        bulkActions = `
          <button class="btn btn-approve-all" onclick="approveAll('${review.id}')">Approve all (${pending.length})</button>
          <button class="btn btn-dismiss-all" onclick="dismissAll('${review.id}')">Dismiss all</button>`;
      } else if (pending.length === 1) {
        bulkActions = `
          <button class="btn btn-approve-all" onclick="approveAll('${review.id}')">Approve</button>
          <button class="btn btn-dismiss-all" onclick="dismissAll('${review.id}')">Dismiss</button>`;
      }

      document.getElementById('main').innerHTML = `
        <div class="detail-header">
          <div>
            <div class="detail-title">
              <a href="${pr.url}" target="_blank">#${pr.number}: ${esc(pr.title)}</a>
            </div>
            <div class="detail-meta">
              ${esc(pr.owner)}/${esc(pr.repo)} · by @${esc(pr.author)} ·
              <span class="severity-badge severity-${review.review.overallSeverity}">
                ${review.review.overallSeverity}
              </span>
              · ${review.comments.length} concern${review.comments.length !== 1 ? 's' : ''}
            </div>
          </div>
          <div class="detail-actions">
            ${bulkActions}
          </div>
        </div>
        <div class="detail-summary">${esc(review.review.summary)}</div>
        <div class="concern-list">
          ${review.comments.map(c => renderConcern(c, pr)).join('')}
        </div>`;
    }

    function renderConcern(comment, pr) {
      const c = comment.concern;
      const fileLink = buildFileLink(pr, c);
      const location = c.line ? `${c.file}:${c.line}` : c.file;

      let actions = '';
      if (comment.status === 'pending') {
        actions = `
          <button class="btn btn-approve" onclick="event.stopPropagation();approve('${comment.id}', this)">Approve</button>
          <button class="btn btn-reject" onclick="event.stopPropagation();reject('${comment.id}', this)">Reject</button>`;
      } else if (comment.status === 'approved') {
        actions = '<span class="status-approved">Posted</span>';
      } else {
        actions = '<span class="status-rejected">Dismissed</span>';
      }

      return `
        <div class="concern">
          <div class="concern-severity ${c.severity}"></div>
          <div class="concern-body">
            <a class="concern-file" href="${fileLink}" target="_blank">${esc(location)}</a>
            <div class="concern-message">${esc(c.message)}</div>
          </div>
          <div class="concern-actions">
            ${actions}
          </div>
        </div>`;
    }

    // ── Hashing for GitHub diff links ──
    const hashCache = {};

    async function sha256(str) {
      if (hashCache[str]) return hashCache[str];
      const buf = new TextEncoder().encode(str);
      const digest = await crypto.subtle.digest('SHA-256', buf);
      const hex = Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
      hashCache[str] = hex;
      return hex;
    }

    async function precomputeHashes(reviews) {
      const files = new Set();
      for (const r of reviews) {
        for (const c of r.comments) {
          files.add(c.concern.file);
        }
      }
      await Promise.all([...files].map(f => sha256(f)));
    }

    function buildFileLink(pr, concern) {
      const hash = hashCache[concern.file] || '';
      const anchor = hash ? `#diff-${hash}` + (concern.line ? `R${concern.line}` : '') : '';
      return `${pr.url}/files${anchor}`;
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ── Actions ──
    async function approve(id, btn) {
      if (btn) btn.disabled = true;
      try {
        const resp = await fetch(`/api/comments/${id}/approve`, { method: 'POST' });
        if (!resp.ok) {
          const err = await resp.json();
          alert('Error: ' + (err.error || 'Unknown'));
          return;
        }
        await loadReviews();
      } catch (e) {
        alert('Failed: ' + e.message);
      }
    }

    async function reject(id, btn) {
      if (btn) btn.disabled = true;
      try {
        const resp = await fetch(`/api/comments/${id}/reject`, { method: 'POST' });
        if (!resp.ok) {
          const err = await resp.json();
          alert('Error: ' + (err.error || 'Unknown'));
          return;
        }
        await loadReviews();
      } catch (e) {
        alert('Failed: ' + e.message);
      }
    }

    async function approveAll(reviewId) {
      try {
        await fetch(`/api/reviews/${reviewId}/approve-all`, { method: 'POST' });
        await loadReviews();
      } catch (e) {
        alert('Failed: ' + e.message);
      }
    }

    async function dismissAll(reviewId) {
      const review = data.reviews.find(r => r.id === reviewId);
      if (!review) return;
      const pending = review.comments.filter(c => c.status === 'pending');
      for (const c of pending) {
        await fetch(`/api/comments/${c.id}/reject`, { method: 'POST' });
      }
      await loadReviews();
    }

    async function triggerScan() {
      const btn = document.getElementById('scan-btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span> Scanning...';
      try {
        const resp = await fetch('/api/scan', { method: 'POST' });
        const result = await resp.json();
        status.textContent = result.message || 'Done';
        await loadReviews();
      } catch (e) {
        status.textContent = 'Scan failed';
      } finally {
        btn.disabled = false;
        setTimeout(() => { status.textContent = ''; }, 5000);
      }
    }

    // ── Keyboard navigation ──
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const filtered = filteredReviews();
      const len = filtered.length;

      if (e.key === 'j' || e.key === 'ArrowDown') {
        e.preventDefault();
        if (!len) return;
        focusedIndex = Math.min(focusedIndex + 1, len - 1);
        selectReview(filtered[focusedIndex].id);
      } else if (e.key === 'k' || e.key === 'ArrowUp') {
        e.preventDefault();
        if (!len) return;
        focusedIndex = Math.max(focusedIndex - 1, 0);
        selectReview(filtered[focusedIndex].id);
      } else if (e.key === 'r') {
        triggerScan();
      } else if (e.key >= '0' && e.key <= '9') {
        // 0 = All, 1-9 = repos by order
        const repos = [...getRepos().keys()];
        const idx = parseInt(e.key);
        if (idx === 0) {
          setRepo(null);
        } else if (idx <= repos.length) {
          setRepo(repos[idx - 1]);
        }
      }
    });

    // ── Init ──
    loadReviews();
    setInterval(loadReviews, 10_000);
  </script>
</body>
</html>
